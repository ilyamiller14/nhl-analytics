name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      # CF_API_TOKEN in GitHub Secrets must include these permissions
      # (create a new token at https://dash.cloudflare.com/profile/api-tokens
      # with the "Edit Cloudflare Pages" template, which grants):
      #   * Account → Cloudflare Pages → Edit
      #   * Account → Account Settings → Read
      #   * User → User Details → Read
      # Without Account Settings + User Details the upload-token call
      # fails with "Authentication error [code: 10000]" even though the
      # account id is passed explicitly. The local `wrangler` CLI uses
      # OAuth and bypasses this, which is why local deploys succeed
      # while CI fails.
      #
      # We call `npx wrangler` directly rather than the wrangler-action
      # wrapper because the action's auto-install has been flaky on CI
      # (it tries to grab the newest wrangler from npm and can hit
      # prompt blocks in the non-interactive runner). With env vars
      # set explicitly, the devDependency wrangler is used.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name=nhl-analytics --branch=production --commit-dirty=true
