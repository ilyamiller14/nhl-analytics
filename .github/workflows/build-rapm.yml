name: Build RAPM

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-rapm:
    name: build-rapm
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build RAPM
        run: npm run build-rapm

      - name: Commit and push if changed
        run: |
          git diff --quiet public/data/rapm-20252026.json || (
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/rapm-20252026.json
            git commit -m "RAPM: nightly rebuild ($(date -u +%Y-%m-%d)) [skip ci]"
            git push origin main
          )
          git diff --quiet public/data/rapm-20252026.json && echo "No changes to RAPM data — skipping commit."
